name: Test Suite

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  flutter-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get


      - name: Generate localization
        run: flutter gen-l10n

      - name: Run analyzer
        run: flutter analyze

      - name: Run test suite
        run: flutter test --coverage
