name: Test Suite

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  flutter-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localization
        run: flutter gen-l10n

      - name: Run analyzer
        run: flutter analyze

      - name: Run test suite
        run: flutter test --coverage

      # =========================
      # 🚀 MANUAL DEPLOY (DEV FLAVOR)
      # =========================

      - name: Build DEV APK
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -e
          flutter build apk --flavor dev --release --no-pub

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        if: github.event_name == 'workflow_dispatch'
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        if: github.event_name == 'workflow_dispatch'
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-dev-release.apk \
            --app 1:52166151557:android:7658fb566675b1225148ec \
            --groups testers \
            --release-notes "Dev build from GitHub Actions 🚀" \
            --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Upload DEV APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-release
          path: build/app/outputs/flutter-apk/app-dev-release.apk
