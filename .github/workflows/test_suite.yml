name: Test Suite

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

      track:
        description: "Play Store track (only for prod)"
        required: false
        default: "internal"
        type: choice
        options:
          - internal
          - beta
          - production

jobs:
  flutter-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Clean project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localization
        run: flutter gen-l10n

      - name: Run analyzer
        run: flutter analyze

      - name: Run test suite
        run: flutter test --coverage

      # =========================
      # 🏷 VERSION FROM TAG
      # =========================

      - name: Get version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          NAME=${VERSION%%+*}

          if [[ "$VERSION" == *"+"* ]]; then
            CODE=${VERSION##*+}
          else
            CODE=""
          fi

          echo "VERSION_NAME=$NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$CODE" >> "$GITHUB_ENV"

      # =========================
      # 📝 CHANGELOG
      # =========================

      - name: Generate changelog
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --pretty=format:"%s" | tr '\n' ' | ')
          else
            LOG=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s" | tr '\n' ' | ')
          fi

          echo "CHANGELOG=$LOG" >> "$GITHUB_ENV"

      # =========================
      # 🚀 DEV → Firebase (TAG -dev)
      # =========================

      - name: Build DEV APK
        if: contains(github.ref, '-dev') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
        run: |
          set -e
          flutter build apk \
            --flavor dev \
            --target lib/main_dev.dart \
            --release \
            --no-pub \
            --build-name=${VERSION_NAME:-1.0.${{ github.run_number }}} \
            --build-number=${VERSION_CODE:-${{ github.run_number }}}

      - name: Upload DEV to Firebase
        if: contains(github.ref, '-dev') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:52166151557:android:7658fb566675b1225148ec
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-dev-release.apk
          releaseNotes: ${{ env.CHANGELOG }}

      # =========================
      # 🔐 SIGNING (PROD)
      # =========================

      - name: Decode Keystore
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-dev')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/monity-upload-keystore.jks

      - name: Create key.properties
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-dev')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
        run: |
          echo "${{ secrets.KEY_PROPERTIES }}" > android/key.properties

      # =========================
      # 🚀 PROD → Play Store (TAG sem -dev)
      # =========================

      - name: Build PROD AAB
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-dev')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
        run: |
          set -e
          flutter build appbundle \
            --flavor prod \
            --target lib/main_prod.dart \
            --release \
            --no-pub \
            --build-name=${VERSION_NAME:-1.0.${{ github.run_number }}} \
            --build-number=${VERSION_CODE:-${{ github.run_number }}}

      - name: Upload PROD to Play Store
        if: (startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-dev')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAYSTORE_SERVICE_ACCOUNT }}
          packageName: com.fagundes.finances_control
          releaseFiles: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          releaseNotes: ${{ env.CHANGELOG }}
